version: '3.8'

services:
  # PostgreSQL Database (production recommended)
  postgres:
    image: postgres:15-alpine
    container_name: eyes-db
    environment:
      POSTGRES_USER: eyes
      POSTGRES_PASSWORD: eyes_password_change_me
      POSTGRES_DB: eyes_detection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eyes"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eyes_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyes-backend
    environment:
      DATABASE_URL: postgresql://eyes:eyes_password_change_me@postgres:5432/eyes_detection
      DEBUG: "False"
      ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000,http://localhost
      WORKERS: 4
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eyes_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eyes-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eyes_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: eyes-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/uploads:/usr/share/nginx/html/uploads:ro
      - ./ssl:/etc/nginx/ssl:ro  # For SSL certificates
    depends_on:
      - backend
      - frontend
    networks:
      - eyes_network
    restart: unless-stopped

  # Redis Cache (optional, for future optimization)
  redis:
    image: redis:7-alpine
    container_name: eyes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eyes_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  eyes_network:
    driver: bridge
